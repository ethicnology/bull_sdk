[package]
name = "rust_lib_bull_sdk"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.11.1"
bbqr = { git = "https://github.com/SatoshiPortal/bbqr-rust.git", rev = "2296a713beb58a175eb620a087f7da6826dc6f70", default-features = false }
dart_bbqr = { path = "../../bbqr/rust", features = ["bull_sdk"] }
boltz = { path = "../../boltz/rust", features = ["bull_sdk"] }
lwk = { path = "../../lwk/rust", features = ["bull_sdk"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
